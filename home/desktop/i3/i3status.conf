general {
    colors = true
    interval = 10
    color_good     = "#f7d7dd"
    color_degraded = "#ff7f50"
    color_bad      = "#ff4d6d"
}

order += "cpu_usage"
order += "memory"
order += "disk /"
order += "battery 0"
order += "tztime local"

cpu_usage {
    format = " CPU %usage"
    max_threshold = 85
    degraded_threshold = 60
}

memory {
    format = " RAM %used / %total"
    threshold_degraded = "2G"
    threshold_critical = "1G"
    format_degraded = " RAM LOW: %free left"
}

disk "/" {
    format = " %avail"
    threshold_type = "percentage_avail"
    low_threshold = 10
}

battery 0 {
    format = "%status %percentage %remaining"
    format_down = "No battery"
    status_chr  = ""
    status_bat  = ""
    status_full = ""
    low_threshold = 15
    threshold_type = percentage
    last_full_capacity = true
    integer_battery_capacity = true
}

tztime local {
    format = " %a %d/%m  %H:%M"
}

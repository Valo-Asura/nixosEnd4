# Keep the local layer on a classic tiled Hyprland layout.
general {
    layout = dwindle
    gaps_in = 3
    gaps_out = 6
    border_size = 3
    no_focus_fallback = true
    col.active_border = rgba(00d9ffff)
    col.inactive_border = rgba(3c3836ff)
}

dwindle {
    preserve_split = true
    smart_split = false
    smart_resizing = false
    precise_mouse_move = true
}

binds {
    drag_threshold = 10
}

gestures {
    # Match the previous fast 3-finger workspace feel while keeping the
    # swipe deterministic on this hybrid-graphics laptop.
    workspace_swipe_distance = 110
    workspace_swipe_cancel_ratio = 0.12
    workspace_swipe_min_speed_to_force = 4
    workspace_swipe_invert = false
    workspace_swipe_direction_lock = true
    workspace_swipe_direction_lock_threshold = 6
    workspace_swipe_create_new = true
    workspace_swipe_forever = false
    workspace_swipe_use_r = false
}

misc {
    # Disable panel VRR to avoid intermittent flicker on this internal eDP.
    vrr = 0
}

render {
    # Keep scanout path conservative for hybrid graphics stability.
    direct_scanout = false
}

cursor {
    # On some hybrid/NVIDIA laptops this removes visible cursor-related
    # flicker/artifacts under Wayland compositors.
    no_hardware_cursors = true
}

decoration {
    rounding = 8
    dim_inactive = false

    blur {
        enabled = false
        xray = false
        size = 4
        passes = 1
        vibrancy = 0.15
    }

    shadow {
        enabled = false
    }
}

input {
    follow_mouse = 1

    touchpad {
        clickfinger_behavior = false
        disable_while_typing = true
        natural_scroll = true
        scroll_factor = 0.9
        tap-to-click = true
        tap_button_map = lrm
    }
}

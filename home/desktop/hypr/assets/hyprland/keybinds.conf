    # Own the main keybind file directly so upstream End-4 shell binds do not
    # keep leaking in underneath local overrides.
    submap = reset

    $mainMod = SUPER
    $shiftMod = SUPER SHIFT
    $altMod = SUPER ALT
    $mod = SUPER

    # Apps and shell entry points.
    bind = $mainMod, Q, killactive,
    bind = $mainMod, H, exit,
    bind = $mainMod, F, exec, file-manager
    bind = $mainMod, V, togglefloating,
    bind = $mainMod, J, togglesplit,
    bind = $mainMod, B, exec, /nix/store/dqvrb8ybqygsd0cgk5jchvzq4hvm6szx-google-chrome-147.0.7727.137/bin/google-chrome-stable
    bind = $mainMod, T, exec, /nix/store/myjlf11fwy8yw3127hxsfyidxz6srg6x-kitty-0.46.2/bin/kitty
    bind = $mainMod, Return, exec, /nix/store/myjlf11fwy8yw3127hxsfyidxz6srg6x-kitty-0.46.2/bin/kitty
    bind = $mainMod, C, exec, code --enable-features=UseOzonePlatform --ozone-platform=wayland
    bind = $mainMod, E, exec, /nix/store/q86y165r6aq8xm922n3l6p6wdv1w8q0d-telegram-desktop-6.7.6/bin/telegram-desktop
    bind = $mainMod, D, exec, search-launcher
    bind = $mainMod, Space, exec, search-launcher
    bindid = Super, Super_L, Toggle search, global, quickshell:searchToggleRelease
    bindid = Super, Super_R, Toggle search, global, quickshell:searchToggleRelease
    binditn = Super, catchall, global, quickshell:searchToggleReleaseInterrupt
    bind = Ctrl, Super_L, global, quickshell:searchToggleReleaseInterrupt
    bind = Ctrl, Super_R, global, quickshell:searchToggleReleaseInterrupt
    bind = Super, mouse:272, global, quickshell:searchToggleReleaseInterrupt
    bind = Super, mouse:273, global, quickshell:searchToggleReleaseInterrupt
    bind = Super, mouse_up, global, quickshell:searchToggleReleaseInterrupt
    bind = Super, mouse_down, global, quickshell:searchToggleReleaseInterrupt
    
    bind = $mainMod, Tab, submap, resize
    bind = $shiftMod, Tab, exec, quickshell-overview
    bind = CTRL, L, exec, quickshell-lock
    bind = $mainMod, L, exec, quickshell-lock

    # Utilities.
    bind = $shiftMod, C, exec, clipboard
    bind = $altMod, C, exec, clipboard
    bind = $shiftMod, E, exec, /nix/store/yfz09xidkd8yfkr05hp6sxkbwih0i195-wofi-emoji-1.1.0/bin/wofi-emoji
    bind = $mainMod, P, exec, quickshell-wallpaper-selector
    bind = $shiftMod, P, exec, wallpaper-random
    bind = $mod, F2, exec, night-shift

    # Window focus and movement.
    bind = $mainMod, Left, movefocus, l
    bind = $mainMod, Right, movefocus, r
    bind = $mainMod, Up, movefocus, u
    bind = $mainMod, Down, movefocus, d
    bind = $shiftMod, Left, movewindow, l
    bind = $shiftMod, Right, movewindow, r
    bind = $shiftMod, Up, movewindow, u
    bind = $shiftMod, Down, movewindow, d

    bindm = $mod, mouse:272, movewindow
    bindm = $mod, mouse:273, resizewindow
    bindm = $mod, Control_L, movewindow
    bindm = $mod, ALT_L, resizewindow

    # Super+Tab enters resize mode.
    # End-4 workspace overview is moved to Super+Shift+Tab.
    bind = $shiftMod, R, submap, resize
    submap = resize
    binde = , Left, resizeactive, -40 0
    binde = , Right, resizeactive, 40 0
    binde = , Up, resizeactive, 0 -40
    binde = , Down, resizeactive, 0 40
    binde = , mouse_up, resizeactive, 40 0
    binde = , mouse_down, resizeactive, -40 0
    binde = SHIFT, mouse_up, resizeactive, 0 40
    binde = SHIFT, mouse_down, resizeactive, 0 -40
    bind = , Escape, submap, reset
    bind = , Return, submap, reset
    bind = , Tab, submap, reset
    bind = $shiftMod, R, submap, reset
    submap = reset

    # Screenshots.
    bind = , Print, exec, /nix/store/8s5p1if67gzz6ymdksbn28b41v1mf06l-grim-1.5.0/bin/grim -g "$(/nix/store/sqq82x62vl51infzy9bcihl80rdgxk6i-slurp-1.5.0/bin/slurp)" - | /nix/store/7gp3a07qydb8rjmg4r156pbrsg30svsy-wl-clipboard-2.3.0/bin/wl-copy
    bind = $mainMod, Print, exec, mkdir -p ~/Pictures && /nix/store/8s5p1if67gzz6ymdksbn28b41v1mf06l-grim-1.5.0/bin/grim ~/Pictures/screenshot-$(date +%Y%m%d-%H%M%S).png
    bind = $shiftMod, Print, exec, mkdir -p ~/Pictures && /nix/store/8s5p1if67gzz6ymdksbn28b41v1mf06l-grim-1.5.0/bin/grim -g "$(/nix/store/sqq82x62vl51infzy9bcihl80rdgxk6i-slurp-1.5.0/bin/slurp)" ~/Pictures/screenshot-$(date +%Y%m%d-%H%M%S).png

    # Workspaces.
bind = $mod, code:10, workspace, 1
bind = $shiftMod, code:10, movetoworkspace, 1
bind = $mod, code:11, workspace, 2
bind = $shiftMod, code:11, movetoworkspace, 2
bind = $mod, code:12, workspace, 3
bind = $shiftMod, code:12, movetoworkspace, 3
bind = $mod, code:13, workspace, 4
bind = $shiftMod, code:13, movetoworkspace, 4
bind = $mod, code:14, workspace, 5
bind = $shiftMod, code:14, movetoworkspace, 5
bind = $mod, code:15, workspace, 6
bind = $shiftMod, code:15, movetoworkspace, 6
bind = $mod, code:16, workspace, 7
bind = $shiftMod, code:16, movetoworkspace, 7
bind = $mod, code:17, workspace, 8
bind = $shiftMod, code:17, movetoworkspace, 8
bind = $mod, code:18, workspace, 9
bind = $shiftMod, code:18, movetoworkspace, 9

    # Hardware keys.
    bindl = , XF86AudioMute, exec, sound-toggle
    bindl = , XF86AudioPlay, exec, /nix/store/4f2p0ik255zma77ymdgxiwgbpbmbm8dy-playerctl-2.4.1/bin/playerctl play-pause
    bindl = , XF86AudioNext, exec, /nix/store/4f2p0ik255zma77ymdgxiwgbpbmbm8dy-playerctl-2.4.1/bin/playerctl next
    bindl = , XF86AudioPrev, exec, /nix/store/4f2p0ik255zma77ymdgxiwgbpbmbm8dy-playerctl-2.4.1/bin/playerctl previous
    bindl = , switch:Lid Switch, exec, quickshell-lock

    bindle = , XF86AudioRaiseVolume, exec, sound-up
    bindle = , XF86AudioLowerVolume, exec, sound-down
    bindle = , XF86MonBrightnessUp, exec, brightness-up
    bindle = , XF86MonBrightnessDown, exec, brightness-down

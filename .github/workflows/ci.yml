name: ci

on:
  pull_request:
  push:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  nix-checks:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v17

      - name: Nix Diagnostics
        run: |
          nix --version
          nix config show experimental-features || true

      - name: Flake Metadata
        run: |
          for attempt in 1 2 3; do
            echo "Flake metadata attempt $attempt/3"
            if nix --extra-experimental-features "nix-command flakes" \
              flake metadata .; then
              exit 0
            fi
            sleep 8
          done
          exit 1

      - name: Structural Tests
        run: |
          nix-shell -p python3 python3Packages.pytest python3Packages.hypothesis \
            --run "pytest tests/test_migration.py -q"

      - name: Dry Build System
        run: |
          nix --extra-experimental-features "nix-command flakes" \
            build .#nixosConfigurations.x15xs.config.system.build.toplevel --no-link
